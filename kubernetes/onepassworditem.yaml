# Optional alternative to secret.yaml — use this if you run the
# 1Password Kubernetes Operator (https://github.com/1Password/onepassword-operator).
#
# The operator creates a Secret named "obsidian-backup-secrets" automatically
# from the referenced 1Password item, matching what the CronJob expects.
#
# 1Password item fields:
#   OBSIDIAN_AUTH_TOKEN  — your auth token from `ob login`
#   E2EE_PASSWORD        — your E2EE password (omit for standard encryption)
#   git-ssh-key          — your SSH private deploy key
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: obsidian-backup-secrets
  namespace: obsidian-backup
spec:
  itemPath: "vaults/HomeLab/items/obsidian-vault-backup"
