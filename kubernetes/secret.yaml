# Create secrets manually with kubectl (see README), or apply this file
# after filling in your values.
#
# WARNING: Do not commit this file with real credentials.
---
apiVersion: v1
kind: Secret
metadata:
  name: obsidian-backup-secrets
  namespace: obsidian-backup
type: Opaque
stringData:
  OBSIDIAN_AUTH_TOKEN: "your-auth-token-here"
  E2EE_PASSWORD: "your-e2ee-password-here"
  id_ed25519: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    ...your deploy key...
    -----END OPENSSH PRIVATE KEY-----
