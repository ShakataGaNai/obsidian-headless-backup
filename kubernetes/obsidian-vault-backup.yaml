---
apiVersion: v1
kind: Namespace
metadata:
  name: obsidian-backup
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: obsidian-vault
  namespace: obsidian-backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: local-path  # k3s default — uncomment or set to your SC
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: obsidian-backup-config
  namespace: obsidian-backup
data:
  VAULT_NAME: "My Vault"
  SYNC_MODE: "mirror-remote"
  # SYNC_FILE_TYPES: "image,audio,video,pdf,unsupported"
  # SYNC_CONFIGS: ""
  # SYNC_EXCLUDED_FOLDERS: ""
  # CONFLICT_STRATEGY: "merge"
  # DEVICE_NAME: "vault-backup"
  # CONFIG_DIR: ".obsidian"
  BACKUP_PROVIDER: "git"
  GIT_REMOTE_URL: "git@github.com:YOURORG/obsidian-vault-backup-data.git"
  GIT_BRANCH: "main"
  # GIT_COMMIT_MESSAGE: "vault backup %DATE%"
  # GIT_AUTHOR_NAME: "Obsidian Vault Backup"
  # GIT_AUTHOR_EMAIL: "vault-backup@noreply"
  TZ: "America/Los_Angeles"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: obsidian-vault-backup
  namespace: obsidian-backup
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
          containers:
            - name: vault-backup
              image: ghcr.io/shakataganai/obsidian-headless-backup:latest
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              envFrom:
                - configMapRef:
                    name: obsidian-backup-config
                - secretRef:
                    name: obsidian-backup-secrets
              volumeMounts:
                - name: vault-data
                  mountPath: /vault
                - name: git-ssh
                  mountPath: /git-ssh
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
                - name: home
                  mountPath: /home/node
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: vault-data
              persistentVolumeClaim:
                claimName: obsidian-vault
            - name: git-ssh
              secret:
                secretName: obsidian-backup-secrets
                items:
                  - key: id_ed25519
                    path: id_ed25519
                    mode: 0400
            - name: tmp
              emptyDir: {}
            - name: home
              emptyDir: {}
